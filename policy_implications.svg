<svg width="100%" viewBox="0 0 720 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Policy implications</title>
  <desc>Consolidated EGU-style policy implications for managing urban heat and drought risk.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f5f0" />
      <stop offset="100%" stop-color="#eef2f1" />
    </linearGradient>
    <radialGradient id="highlight" cx="0.3" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#f8f5e9" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#eef2f1" stop-opacity="0" />
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#9ea8ab" flood-opacity="0.18" />
    </filter>
    <style>
      .body { font-family: 'Inter', system-ui, sans-serif; }
      .background { fill: url(#bgGrad); }
      .glow { fill: url(#highlight); }
      .title { font-size: 28px; font-weight: 700; fill: #1f1c17; }
      .subtitle { font-size: 14px; fill: #5d615b; letter-spacing: 0.02em; }
      .section-line { stroke: #8fa9a5; stroke-width: 2; opacity: 0.32; }
      .card { fill: #ffffff; stroke: #dde4e1; stroke-width: 1.2; rx: 20; filter: url(#softShadow); }
      .card-title { font-size: 15px; font-weight: 700; fill: #1f1c17; }
      .card-text { font-size: 13px; fill: #565147; line-height: 1.4; }
      .icon-circle { fill: #e9f4f1; }
      .icon-accent { fill: #1b6a73; }
      .icon-line { fill: none; stroke: #1b6a73; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .accent-label { font-size: 11px; fill: #4e7c7f; text-transform: uppercase; letter-spacing: 0.12em; }
      .note { font-size: 11px; fill: #757169; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="background" />
  <circle cx="520" cy="90" r="130" class="glow" />
  <circle cx="160" cy="260" r="90" class="glow" />

  <g transform="translate(40, 34)">
    <text class="accent-label">EGU policy brief</text>
    <text class="title" y="28">Policy implications</text>
    <text class="subtitle" y="54">Four practical directions for peri-urban heat and drought resilience at EGU scale.</text>
    <line class="section-line" x1="0" y1="78" x2="660" y2="78" />
  </g>

  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="320" height="120" class="card" />
    <g transform="translate(24, 20)">
      <circle cx="24" cy="24" r="24" class="icon-circle" />
      <path d="M20 24 L28 24 L28 32 L20 32 Z" class="icon-line" />
      <path d="M24 14 L24 34" class="icon-line" />
      <path d="M18 20 L24 14 L30 20" class="icon-line" />
      <text class="card-title" x="60" y="22">Protect peri-urban green fields</text>
      <text class="card-text" x="60" y="44">
        <tspan x="60" dy="0">Strengthen zoning to limit grassland</tspan>
        <tspan x="60" dy="18">conversion into impervious land cover.</tspan>
      </text>
    </g>
  </g>

  <g transform="translate(380, 100)">
    <rect x="0" y="0" width="320" height="120" class="card" />
    <g transform="translate(24, 20)">
      <circle cx="24" cy="24" r="24" class="icon-circle" />
      <path d="M18 30 C22 18, 26 18, 30 30" class="icon-line" />
      <path d="M18 24 C22 20, 26 20, 30 24" class="icon-line" />
      <path d="M24 12 L24 36" class="icon-line" />
      <text class="card-title" x="60" y="22">Reframe water planning</text>
      <text class="card-text" x="60" y="44">
        <tspan x="60" dy="0">Embed elevated ET₀ into irrigation</tspan>
        <tspan x="60" dy="18">and resource allocation decisions.</tspan>
      </text>
    </g>
  </g>

  <g transform="translate(40, 240)">
    <rect x="0" y="0" width="320" height="120" class="card" />
    <g transform="translate(24, 20)">
      <circle cx="24" cy="24" r="24" class="icon-circle" />
      <path d="M20 14 L28 14 L28 34 L20 34 Z" class="icon-line" />
      <circle cx="24" cy="36" r="4" class="icon-accent" />
      <text class="card-title" x="60" y="22">Expand heat action plans</text>
      <text class="card-text" x="60" y="44">
        <tspan x="60" dy="0">Include peri-urban transition zones</tspan>
        <tspan x="60" dy="18">in urban heat risk preparedness.</tspan>
      </text>
    </g>
  </g>

  <g transform="translate(380, 240)">
    <rect x="0" y="0" width="320" height="120" class="card" />
    <g transform="translate(24, 20)">
      <circle cx="24" cy="24" r="24" class="icon-circle" />
      <path d="M20 14 C22 8, 28 8, 30 14 C32 18, 28 22, 24 32 C20 22, 16 18, 20 14 Z" fill="#c1d9a0" stroke="#3f6b35" stroke-width="1.4" />
      <path d="M22 18 C24 14, 26 14, 28 18" class="icon-line" />
      <text class="card-title" x="60" y="22">Grow drought-smart vegetation</text>
      <text class="card-text" x="60" y="44">
        <tspan x="60" dy="0">Prioritize native grasses and shaded</tspan>
        <tspan x="60" dy="18">corridors for resilience.</tspan>
      </text>
    </g>
  </g>

  <text class="note" x="40" y="375">EGU 2026 | Policy summary for peri-urban heat and drought risk management</text>
</svg>
